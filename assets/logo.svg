<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a2a4a"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </radialGradient>
    <linearGradient id="wolfBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7a9bcb"/>
      <stop offset="50%" style="stop-color:#4a6a9a"/>
      <stop offset="100%" style="stop-color:#3a5a8a"/>
    </linearGradient>
    <linearGradient id="eyeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffcc44"/>
      <stop offset="100%" style="stop-color:#ff8800"/>
    </linearGradient>
    <linearGradient id="dataArc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a9eff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#4a9eff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#4a9eff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="url(#bgGrad)" stroke="#2a4060" stroke-width="1.5"/>

  <!-- Outer data rings -->
  <circle cx="200" cy="200" r="170" fill="none" stroke="#4a9eff" stroke-width="0.5" opacity="0.12" stroke-dasharray="3,10"/>
  <circle cx="200" cy="200" r="155" fill="none" stroke="#4a9eff" stroke-width="0.8" opacity="0.08"/>

  <!-- Data orbit arcs -->
  <path d="M 45,200 A 155,155 0 0,1 355,200" fill="none" stroke="url(#dataArc)" stroke-width="2" opacity="0.3"/>
  <path d="M 200,45 A 155,155 0 0,1 200,355" fill="none" stroke="url(#dataArc)" stroke-width="2" opacity="0.3" transform="rotate(60,200,200)"/>

  <!-- Memory data nodes -->
  <circle cx="50" cy="200" r="2.5" fill="#4a9eff" opacity="0.4"/>
  <circle cx="350" cy="200" r="2.5" fill="#4a9eff" opacity="0.4"/>
  <circle cx="200" cy="290" r="2.5" fill="#4a9eff" opacity="0.3"/>

  <!-- Wolf head - centered, sleek -->
  <g transform="translate(200, 205)">
    <!-- Main head shape -->
    <path d="
      M-55,-60
      C-60,-80 -48,-95 -40,-100
      C-32,-105 -18,-100 -10,-85
      C-4,-75 0,-62 0,-55
      C0,-62 4,-75 10,-85
      C18,-100 32,-105 40,-100
      C48,-95 60,-80 55,-60
      C52,-48 45,-30 38,-15
      C30,0 18,15 8,28
      C4,34 2,38 0,42
      C-2,38 -4,34 -8,28
      C-18,15 -30,0 -38,-15
      C-45,-30 -52,-48 -55,-60
      Z
    " fill="url(#wolfBody)"/>

    <!-- Left ear outer -->
    <path d="M-38,-96 C-44,-118 -50,-130 -56,-136 C-50,-122 -46,-105 -42,-92" fill="url(#wolfBody)"/>
    <!-- Left ear inner -->
    <path d="M-40,-98 C-44,-114 -48,-124 -52,-128 C-48,-118 -45,-104 -42,-94" fill="#5a7aaa" opacity="0.5"/>

    <!-- Right ear outer -->
    <path d="M38,-96 C44,-118 50,-130 56,-136 C50,-122 46,-105 42,-92" fill="url(#wolfBody)"/>
    <!-- Right ear inner -->
    <path d="M40,-98 C44,-114 48,-124 52,-128 C48,-118 45,-104 42,-94" fill="#5a7aaa" opacity="0.5"/>

    <!-- Forehead ridge -->
    <path d="M-15,-80 C-8,-85 8,-85 15,-80" fill="none" stroke="#6a8aba" stroke-width="1" opacity="0.3"/>

    <!-- Eye sockets -->
    <ellipse cx="-18" cy="-58" rx="10" ry="8" fill="#1a1a2e" opacity="0.3"/>
    <ellipse cx="18" cy="-58" rx="10" ry="8" fill="#1a1a2e" opacity="0.3"/>

    <!-- Eyes with glow -->
    <ellipse cx="-18" cy="-58" rx="7" ry="5.5" fill="#1a1a2e"/>
    <ellipse cx="18" cy="-58" rx="7" ry="5.5" fill="#1a1a2e"/>
    <ellipse cx="-18" cy="-58" rx="4.5" ry="3.5" fill="url(#eyeGlow)" filter="url(#glow)"/>
    <ellipse cx="18" cy="-58" rx="4.5" ry="3.5" fill="url(#eyeGlow)" filter="url(#glow)"/>
    <!-- Pupils -->
    <ellipse cx="-18" cy="-58" rx="1.5" ry="2.5" fill="#fff" opacity="0.7"/>
    <ellipse cx="18" cy="-58" rx="1.5" ry="2.5" fill="#fff" opacity="0.7"/>

    <!-- Nose bridge -->
    <path d="M-3,-45 L-3,-38 M3,-45 L3,-38" stroke="#5a7aaa" stroke-width="1" opacity="0.4"/>

    <!-- Nose -->
    <ellipse cx="0" cy="-42" rx="5.5" ry="3.5" fill="#1a1a2e"/>
    <ellipse cx="-1.5" cy="-43" rx="2" ry="1.2" fill="#333" opacity="0.3"/>

    <!-- Gently open mouth -->
    <path d="M-6,-36 C-4,-32 4,-32 6,-36" fill="none" stroke="#1a1a2e" stroke-width="1.2" opacity="0.4"/>

    <!-- Cheek fur texture -->
    <path d="M-35,-30 C-40,-20 -42,-10 -38,-5" stroke="#6a8aba" stroke-width="0.8" fill="none" opacity="0.3"/>
    <path d="M35,-30 C40,-20 42,-10 38,-5" stroke="#6a8aba" stroke-width="0.8" fill="none" opacity="0.3"/>

    <!-- Neck -->
    <path d="M-15,28 C-20,42 -15,58 0,62 C15,58 20,42 15,28" fill="#3a5a8a" opacity="0.4"/>

    <!-- Chest fur -->
    <path d="M-10,55 C-5,65 5,65 10,55" fill="none" stroke="#5a7aaa" stroke-width="1" opacity="0.2"/>

    <!-- Memory core node (center of mind) -->
    <circle cx="0" cy="-12" r="2" fill="#4a9eff" opacity="0.6" filter="url(#glow)"/>
  </g>

  <!-- Brand text -->
  <text x="200" y="355" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="26" font-weight="800" fill="#c0d0e0" letter-spacing="4">
    JASWOLF
  </text>
  <text x="200" y="378" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#5a7aaa" letter-spacing="3" opacity="0.6">
    LONG-TERM MEMORY
  </text>
</svg>
